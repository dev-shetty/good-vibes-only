<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Good Vibes Only Options</title>
    <script src="theme.js"></script>
    <style>
      body {
        max-width: 760px;
        margin: 32px auto;
        padding: 0 16px;
        font:
          15px system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        color: var(--gvo-text);
        background: var(--gvo-surface);
      }
      h1 {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      h1 img {
        width: 44px;
        height: 44px;
        border-radius: 8px;
      }
      textarea {
        width: 100%;
        min-height: 110px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--gvo-border);
        background: var(--gvo-surface);
        color: var(--gvo-text);
      }
      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--gvo-accent);
        background: var(--gvo-accent);
        color: var(--gvo-accent-text);
        font-weight: 600;
        cursor: pointer;
      }
      .check {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .row {
        margin: 18px 0;
      }
      .muted {
        color: var(--gvo-muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1><img src="../icons/icon48.png" alt="" /> Good Vibes Only Options</h1>
    <div class="row check">
      <input id="debugMode" type="checkbox" />
      <label for="debugMode">Debug mode: show score and matched keywords on each card</label>
    </div>
    <div class="row">
      <label>Enabled sites, one domain per line</label>
      <textarea id="enabledSites"></textarea>
    </div>
    <div class="row">
      <label>Extra block keywords, one per line</label>
      <textarea id="customBlockKeywords"></textarea>
    </div>
    <div class="row">
      <label>Always-allow keywords, one per line</label>
      <textarea id="customAllowKeywords"></textarea>
    </div>
    <button id="save">Save</button>
    <span id="msg" class="muted"></span>
    <p class="muted">Tip: start with a few sites. Site-specific selectors are easier to tune than parsing every website generically.</p>
    <script src="defaults.js"></script>
    <script src="options.js"></script>
  </body>
</html>
