<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Good Vibes Only Options</title>
    <style>
      body {
        max-width: 760px;
        margin: 32px auto;
        padding: 0 16px;
        font:
          15px system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        color: #14532d;
      }
      textarea {
        width: 100%;
        min-height: 110px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #86efac;
      }
      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #16a34a;
        background: #dcfce7;
        cursor: pointer;
      }
      .check {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .row {
        margin: 18px 0;
      }
      .muted {
        color: #4d7c0f;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>🌿 Good Vibes Only Options</h1>
    <div class="row check">
      <input id="debugMode" type="checkbox" />
      <label for="debugMode">Debug mode: show score and matched keywords on each card</label>
    </div>
    <div class="row">
      <label>Enabled sites, one domain per line</label>
      <textarea id="enabledSites"></textarea>
    </div>
    <div class="row">
      <label>Extra block keywords, one per line</label>
      <textarea id="customBlockKeywords"></textarea>
    </div>
    <div class="row">
      <label>Always-allow keywords, one per line</label>
      <textarea id="customAllowKeywords"></textarea>
    </div>
    <button id="save">Save</button>
    <span id="msg" class="muted"></span>
    <p class="muted">Tip: start with a few sites. Site-specific selectors are easier to tune than parsing every website generically.</p>
    <script src="defaults.js"></script>
    <script src="options.js"></script>
  </body>
</html>
